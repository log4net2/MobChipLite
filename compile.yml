name: Build Project

on:
  push:
    branches: [ main, ver/* ]
  pull_request:
    branches: [ main, ver/* ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    name: Gradle Setup
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/wrapper-validation-action@v3
      - &java-setup
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Setup Project
        run: ./gradlew project tasks :mobchip-bukkit:dependencies

  build:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    name: Build Project
    steps:
      - uses: actions/checkout@v4
      - *java-setup
      - name: Build Shadow Jar
        run: ./gradlew clean shadowJar

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: setup
    name: Test Project
    steps:
      - uses: actions/checkout@v4
      - *java-setup
      - name: Gradle Test
        run: ./gradlew test

  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, build]
    name: Create Artifacts
    steps:
      - uses: actions/checkout@v4
      - *java-setup

      - name: Build Shadow Jar
        run: ./gradlew clean shadowJar

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: mobchip
          path: |
            **/build/libs/*-all.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy JavaDocs
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v4
      - *java-setup
      - name: Build JavaDocs
        run: ./gradlew clean allJavadoc
      - name: Deploy JavaDoc
        run: bash javadoc.sh ${GITHUB_SHA::7}
